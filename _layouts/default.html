<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']]
    },
    svg: { fontCache: 'global' }
  };
</script>
<script type="text/javascript" id="MathJax-script" async
  src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
  <meta charset="UTF-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fixed CSS reference -->
  <link rel="stylesheet" href="{{ site.baseurl }}/styles.css">
</head>
  <nav class="navbar">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/about/' | relative_url }}">About Me</a>
    <a href="{{ '/university-projects/' | relative_url }}">University Projects</a>
    <a href="{{ '/home-projects/' | relative_url }}">At Home Projects</a>
  </nav>

  <div class="container">
    {{ content }}
  </div>

  <footer class="footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }} — Built with Jekyll & GitHub Pages</p>
  </footer>
</body>
</html>
